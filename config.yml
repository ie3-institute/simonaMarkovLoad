input:
  skiprows: 0
  timestamp_col: "time"
  value_col: "value [kWh]"
  value_representation: "interval_energy"
  interval_minutes: 15
  drop_negative_deltas: true
  pools: false      # true: train one model per subdirectory of data

splitting:
  value_representation: "absolute" # else percent is possible
  value: 1.28
  remove_constants: true

model:
  n_states: 10

gmm:
  n_jobs: -1
  random_state: 42

output:
  psdm_json: "out/psdm_model.json"
  show_plots: true
