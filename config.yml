input:
  skiprows: 21
  timestamp_col: "Zeitstempel"
  value_col: "Messwert"
  value_representation: "cumulative_energy"
  interval_minutes: 15
  drop_negative_deltas: true
  pools: false      # true: train one model per subdirectory of data/raw

model:
  n_states: 10

gmm:
  n_jobs: -1
  random_state: 42

output:
  psdm_json: "out/psdm_model.json"
  show_plots: true
